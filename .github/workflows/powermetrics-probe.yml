name: powermetrics probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - name: Host details
        run: |
          set -euxo pipefail
          sw_vers
          uname -a
          sysctl -n machdep.cpu.brand_string || true
          sysctl -n hw.optional.arm64 || true

      - name: Probe powermetrics
        run: |
          set -uxo pipefail
          mkdir -p powermetrics-output
          sudo -n true
          powermetrics --help > powermetrics-output/help.txt 2>&1 || true

          for sampler in cpu_power gpu_power ane_power smc all; do
            echo "=== sampler: ${sampler} ===" | tee "powermetrics-output/${sampler}.txt"
            timeout 30 sudo powermetrics --samplers "${sampler}" -n 3 -i 1000 \
              >> "powermetrics-output/${sampler}.txt" 2>&1
            status=$?
            echo "exit_status=${status}" >> "powermetrics-output/${sampler}.txt"
          done

      - name: Summarize power-looking lines
        if: always()
        run: |
          set -uxo pipefail
          {
            echo '## powermetrics probe summary'
            echo
            echo '```'
            grep -RniE 'power|energy|watt|mw|joule|unsupported|not permitted|denied|unknown sampler|unavailable|no samples' powermetrics-output || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw powermetrics output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powermetrics-output
          path: powermetrics-output
